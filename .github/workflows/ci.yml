name: Build and Test

on:
  push:
    branches: [ '*' ]
    tags: [ 'v*' ]  # Run on version tags for artifact generation
  pull_request:
    branches: [ main, develop ]
  merge_group:
  workflow_dispatch:

# Cancel in-progress runs for the same workflow and ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write          # required by publish-unit-test-result-action to create/update check runs
  pull-requests: write   # needed for PR comments/status on test results

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  setup:
    name: Extract Build Configuration
    runs-on: ubuntu-latest
    outputs:
      frameworks: ${{ steps.extract.outputs.frameworks }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Extract configuration
        id: extract
        uses: ./.github/actions/extract-build-config

  build-and-test:
    name: Build and Test
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        framework: ${{ fromJSON(needs.setup.outputs.frameworks) }}

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0  # Full history for Source Link

    - name: Extract configuration
      id: extract
      uses: ./.github/actions/extract-build-config

    - name: Setup .NET SDKs
      uses: ./.github/actions/setup-dotnet-sdks
      with:
        dotnet-version: ${{ steps.extract.outputs.versions }}

    - name: Restore dependencies
      run: dotnet restore --force-evaluate

    - name: Build
      run: dotnet build tests/HeroParser.Tests/HeroParser.Tests.csproj --configuration Release --no-restore --framework ${{ matrix.framework }}

    - name: Run Unit Tests
      run: >
        dotnet test tests/HeroParser.Tests
        --configuration Release --no-build
        --framework ${{ matrix.framework }}
        --verbosity normal
        --logger "trx;LogFileName=test-results-unit.trx"
        --results-directory ./TestResults/unit
        --filter "Category=Unit"
        ${{ matrix.os == 'ubuntu-latest' && matrix.framework == 'net10.0' && '--collect:"XPlat Code Coverage"' || '' }}

    - name: Run Integration Tests
      run: >
        dotnet test tests/HeroParser.Tests
        --configuration Release --no-build
        --framework ${{ matrix.framework }}
        --verbosity normal
        --logger "trx;LogFileName=test-results-integration.trx"
        --results-directory ./TestResults/integration
        --filter "Category=Integration"
        ${{ matrix.os == 'ubuntu-latest' && matrix.framework == 'net10.0' && '--collect:"XPlat Code Coverage"' || '' }}

    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.24.0
      if: always() && matrix.os == 'ubuntu-latest' && matrix.framework == 'net10.0'
      with:
        files: 'TestResults/**/*.trx'
        check_name: 'Test Results (${{ matrix.os }} - ${{ matrix.framework }})'
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.framework }}
        path: TestResults/**/*.trx
        retention-days: 30

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.framework == 'net10.0'
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        files: 'TestResults/**/coverage.cobertura.xml'
        fail_ci_if_error: false
        flags: unittests
        name: codecov-${{ matrix.os }}

  aot-tests:
    name: AOT Compatibility Tests
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        framework: ${{ fromJSON(needs.setup.outputs.frameworks) }}

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Extract configuration
      id: extract
      uses: ./.github/actions/extract-build-config

    - name: Setup .NET SDKs
      uses: ./.github/actions/setup-dotnet-sdks
      with:
        dotnet-version: ${{ steps.extract.outputs.versions }}

    - name: Restore dependencies
      run: dotnet restore --force-evaluate

    - name: Build AOT Tests
      run: dotnet build tests/HeroParser.AotTests --configuration Release --framework ${{ matrix.framework }}

    - name: Run AOT Tests
      run: dotnet run --project tests/HeroParser.AotTests --configuration Release --framework ${{ matrix.framework }} --no-build

    # Verify Native AOT publish is clean and the natively-compiled binary runs.
    # JIT-only runs above miss IL2070/IL2090 warnings and ILC codegen failures
    # because the IL compiler never runs. Gated to one OS/framework combo since
    # native publish is slow (~5 min) and bugs here are rarely platform-specific.
    - name: AOT publish (ILC)
      if: matrix.os == 'ubuntu-latest' && matrix.framework == 'net10.0'
      run: dotnet publish tests/HeroParser.AotTests --configuration Release --framework ${{ matrix.framework }} --runtime linux-x64

    - name: Run natively-compiled AOT binary
      if: matrix.os == 'ubuntu-latest' && matrix.framework == 'net10.0'
      run: ./tests/HeroParser.AotTests/bin/Release/${{ matrix.framework }}/linux-x64/publish/HeroParser.AotTests

  generator-tests:
    name: Source Generator Tests
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        framework: ${{ fromJSON(needs.setup.outputs.frameworks) }}

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Extract configuration
      id: extract
      uses: ./.github/actions/extract-build-config

    - name: Setup .NET SDKs
      uses: ./.github/actions/setup-dotnet-sdks
      with:
        dotnet-version: ${{ steps.extract.outputs.versions }}

    - name: Restore dependencies
      run: dotnet restore --force-evaluate

    - name: Build Generator Tests
      run: dotnet build tests/HeroParser.Generators.Tests --configuration Release --framework ${{ matrix.framework }}

    - name: Run Generator Tests
      run: dotnet test tests/HeroParser.Generators.Tests --configuration Release --no-build --framework ${{ matrix.framework }} --verbosity normal

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - name: Extract configuration
      id: extract
      uses: ./.github/actions/extract-build-config

    - name: Setup .NET SDKs
      uses: ./.github/actions/setup-dotnet-sdks
      with:
        dotnet-version: ${{ steps.extract.outputs.versions }}

    - name: Restore dependencies
      run: dotnet restore --force-evaluate

    - name: Audit dependencies (deprecated/vulnerable)
      run: |
        dotnet list package --deprecated
        dotnet list package --vulnerable --include-transitive

    - name: Build (with warnings as errors)
      run: dotnet build --configuration Release --no-restore /p:TreatWarningsAsErrors=true

    - name: Check formatting
      run: dotnet format --verify-no-changes --verbosity diagnostic

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      security-events: write
      pull-requests: write   # needed for comment-summary-in-pr

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0  # Need full history for comparing commits on push events

    - name: Dependency Review
      uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
      with:
        fail-on-severity: high
        deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
        comment-summary-in-pr: ${{ github.event_name == 'pull_request' && 'always' || 'never' }}
        # For push events, compare against previous commit
        # For PRs, these are automatically detected
        base-ref: ${{ github.event_name == 'push' && github.event.before || '' }}
        head-ref: ${{ github.event_name == 'push' && github.sha || '' }}
