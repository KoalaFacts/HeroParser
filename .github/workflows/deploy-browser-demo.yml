name: Deploy Browser Demo

on:
  push:
    branches:
      - main
    paths:
      - 'npm/**'
      - 'src/HeroParser.Wasm/**'
      - '.github/workflows/deploy-browser-demo.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build and Deploy Demo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Install WebAssembly workload
        run: dotnet workload install wasm-tools

      - name: Publish WASM project
        run: dotnet publish src/HeroParser.Wasm/HeroParser.Wasm.csproj -c Release -p:IsWasmBuildJob=true

      - name: Copy WASM assets to npm package
        run: |
          mkdir -p npm/packages/heroparser/_framework
          cp -r src/HeroParser.Wasm/bin/Release/net10.0/publish/wwwroot/_framework/* npm/packages/heroparser/_framework/
          # Remove ICU databases and compressed duplicates to reduce package size
          rm -f npm/packages/heroparser/_framework/*.dat
          rm -f npm/packages/heroparser/_framework/*.br
          rm -f npm/packages/heroparser/_framework/*.gz


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'npm/package-lock.json'

      - name: Install workspace dependencies
        run: npm install --prefix npm --legacy-peer-deps

      - name: Build browser demo
        run: npm run build --prefix npm --workspace=browser-demo --legacy-peer-deps

      - name: Deploy to gh-pages
        run: |
          # Configure Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Clone gh-pages branch
          git clone --branch gh-pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git /tmp/gh-pages
          
          # Recreate demo directory in gh-pages clone
          rm -rf /tmp/gh-pages/demo
          mkdir -p /tmp/gh-pages/demo
          
          # Copy compiled files
          cp -r npm/examples/browser-demo/dist/* /tmp/gh-pages/demo/
          
          # Commit and Push
          cd /tmp/gh-pages
          git add demo/
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: deploy WASM browser demo from commit ${{ github.sha }}"
            git push origin gh-pages
            echo "Successfully deployed demo to GitHub Pages!"
          else
            echo "No changes in demo files detected. Skipping deployment."
          fi
