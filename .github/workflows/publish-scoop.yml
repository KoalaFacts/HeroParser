name: Publish to Scoop

on:
  # Trigger when create-release workflow completes successfully
  workflow_run:
    workflows: ["Create Release"]
    types: [completed]
    branches: [main]
  # Keep manual trigger for retrying or custom version submissions
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g., 2.5.1)'
        required: false
        type: string

# Prevent concurrent publishes
concurrency:
  group: publish-scoop
  cancel-in-progress: false

permissions:
  contents: read

env:
  CI: true

jobs:
  get-version:
    runs-on: ubuntu-latest
    # Only run if create-release workflow succeeded (or if manually triggered)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      tag: ${{ steps.version.outputs.TAG }}
    steps:
      - name: Determine version from release
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            # Get the latest release (most recently created)
            echo "Finding latest release from create-release workflow..."

            TAG=$(gh api repos/${GITHUB_REPOSITORY}/releases \
              --jq ".[0].tag_name" | head -n 1)

            if [ -z "${TAG}" ] || [ "${TAG}" = "null" ]; then
              echo "Error: Could not find any releases"
              exit 1
            fi

            VERSION="${TAG#v}"
            echo "Using latest release: ${TAG}"
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
          else
            # Try to fetch latest release from GitHub API
            TAG=$(gh api repos/${GITHUB_REPOSITORY}/releases \
              --jq ".[0].tag_name" | head -n 1)
            if [ -z "${TAG}" ] || [ "${TAG}" = "null" ]; then
              echo "Error: No version specified and could not find any releases"
              exit 1
            fi
            VERSION="${TAG#v}"
            echo "Using latest release: ${TAG}"
          fi

          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION (tag: $TAG)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    runs-on: ubuntu-latest
    needs: get-version
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Record version in summary
        run: |
          echo "## Publishing Scoop manifest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Detected version: ${{ needs.get-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: ${{ needs.get-version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY

      - name: Download release asset
        run: |
          TAG="${{ needs.get-version.outputs.tag }}"
          VERSION="${{ needs.get-version.outputs.version }}"

          echo "Downloading Windows archive from release $TAG..."
          gh release download "$TAG" --repo "${{ github.repository }}" --pattern "heroparser-v${VERSION}-win-x64.zip"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Calculate SHA-256 Checksum
        id: checksum
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"
          WIN_SHA=$(sha256sum heroparser-v${VERSION}-win-x64.zip | cut -d' ' -f1)
          echo "win_sha=$WIN_SHA" >> $GITHUB_OUTPUT
          echo "SHA-256 for Windows zip: $WIN_SHA"

      - name: Clone Scoop Bucket Repository
        run: |
          TOKEN="${{ secrets.WINGET_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}"
          git clone "https://x-access-token:${TOKEN}@github.com/KoalaFacts/scoop-bucket.git" bucket-repo

      - name: Update Manifest
        shell: python
        run: |
          import os
          import json
          
          version = "${{ needs.get-version.outputs.version }}"
          win_sha = "${{ steps.checksum.outputs.win_sha }}"
          
          manifest = {
              "version": version,
              "description": "High-performance, AI-native CLI tool for tabular data processing",
              "homepage": "https://github.com/KoalaFacts/HeroParser",
              "license": "MIT",
              "architecture": {
                  "64bit": {
                      "url": f"https://github.com/KoalaFacts/HeroParser/releases/download/v{version}/heroparser-v{version}-win-x64.zip",
                      "hash": win_sha
                  }
              },
              "bin": "heroparser.exe",
              "checkver": {
                  "github": "https://github.com/KoalaFacts/HeroParser"
              },
              "autoupdate": {
                  "architecture": {
                      "64bit": {
                          "url": "https://github.com/KoalaFacts/HeroParser/releases/download/v$version/heroparser-v$version-win-x64.zip"
                      }
                  }
              }
          }
          
          os.makedirs("bucket-repo/bucket", exist_ok=True)
          with open("bucket-repo/bucket/heroparser.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, indent=4)
          
          print("Manifest file updated successfully.")

      - name: Commit and Push to Scoop Bucket
        run: |
          cd bucket-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/heroparser.json
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "feat: bump heroparser to v${{ needs.get-version.outputs.version }}"
            git push origin main
          fi

run-name: ${{ github.event_name == 'workflow_dispatch' && format('Publish Scoop v{0}', inputs.version || 'latest') || 'Publish Scoop' }}
